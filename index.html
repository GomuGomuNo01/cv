<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        viewport-fit=cover, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>CV – Cédric KOUADIO | Data Analyst · IA &amp; Big Data</title>
  <style>
    /* ─── Reset ──────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── Full-height flex shell ──────────────────────── */
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      min-height: 100dvh; /* iOS 15+ dynamic viewport */
      overflow-x: hidden;
    }

    /* ─── Header ──────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      border-bottom: 3px solid #e94560;
      padding-top: env(safe-area-inset-top, 0px); /* iOS notch */
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
    }
    .title { flex: 1; min-width: 0; }
    .title h1 {
      color: #fff;
      font-size: clamp(15px, 4vw, 20px);
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title p {
      color: #e94560;
      font-size: clamp(9px, 2.3vw, 11px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── Buttons ─────────────────────────────────────── */
    .actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .btn {
      height: 42px; min-width: 42px;
      border-radius: 9px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { opacity: .72; transform: scale(.92); }
    .btn svg { display: block; }

    .btn-li { background: #0A66C2; }           /* LinkedIn brand */
    .btn-gh { background: #ffffff; }            /* GitHub brand  */
    .btn-li svg, .btn-gh svg { width: 22px; height: 22px; }

    .btn-dl {
      background: #e94560; color: #fff;
      font-size: 13px; font-weight: 700;
      padding: 0 14px; gap: 7px; white-space: nowrap;
    }
    .btn-dl svg { width: 16px; height: 16px; }
    @media (max-width: 370px) {
      .dl-lbl { display: none; }
      .btn-dl { padding: 0 11px; }
    }

    /* ─── Viewer ──────────────────────────────────────── */
    .viewer {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: #ffffff;   /* white = no grey gap when image is shorter */
      display: block;        /* block avoids flex gap below image */
    }

    /* CV image — pinch-to-zoom works natively */
    .cv-img {
      display: block;
      width: 100%;
      max-width: 860px;
      height: auto;
      margin: 0 auto;        /* center on wide screens */
    }

    /* ─── Footer ──────────────────────────────────────── */
    .footer {
      flex-shrink: 0;
      background: #f8f9fa;
      border-top: 1px solid #ddd;
      padding: 10px 16px;
      padding-bottom: max(env(safe-area-inset-bottom, 10px), 10px);
      font-size: 12px; color: #666;
      text-align: center; line-height: 2;
    }
    .footer a { color: #e94560; text-decoration: none; font-weight: 700; }

    /* ─── Desktop: shadow + padding around image ──────── */
    @media (min-width: 600px) {
      .header-inner { padding: 12px 20px; }
      .viewer { padding: 16px; }
      .cv-img {
        border-radius: 4px;
        box-shadow: 0 6px 32px rgba(0,0,0,.3);
      }
    }
  </style>
</head>
<body>

  <script>
    async function downloadCV() {
      const filename = 'CV_Kouadio_Cedric.pdf';
      try {
        /* fetch as blob so iOS Safari triggers a real download
           instead of navigating away to the built-in PDF viewer */
        const res  = await fetch(filename);
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      } catch (e) {
        /* network error fallback */
        window.open(filename, '_blank');
      }
    }
  </script>
