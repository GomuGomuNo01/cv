<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>CV – Cédric KOUADIO | Data Analyst · IA & Big Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Header ───────────────────────────────────────────── */
        .header-bar {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e94560;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-info { flex: 1; }

        .header-info h1 {
            color: white;
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .header-info p {
            color: #e94560;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── Action buttons ────────────────────────────────────── */
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            color: white;
            background: transparent;
        }

        .btn:hover { background: rgba(255,255,255,0.12); }
        .btn:active { transform: scale(0.95); }

        .btn-download {
            background: #e94560;
            color: white;
        }
        .btn-download:hover { background: #c73651; }

        /* ── Social icon buttons ───────────────────────────────── */
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.15s;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .icon-btn:hover  { opacity: 0.85; }
        .icon-btn:active { transform: scale(0.93); }

        /* LinkedIn official brand color */
        .icon-btn-linkedin { background: #0A66C2; }
        /* GitHub official brand color */
        .icon-btn-github   { background: #ffffff; }

        .icon-btn svg { width: 20px; height: 20px; }

        /* ── PDF viewer ────────────────────────────────────────── */
        .pdf-container {
            flex: 1;
            overflow: auto;
            background: #e8e8e8;
            -webkit-overflow-scrolling: touch;
        }

        .pdf-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Mobile fallback overlay */
        .mobile-fallback {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            padding: 20px;
            text-align: center;
            color: #333;
        }
        .mobile-fallback p { font-size: 15px; color: #555; }
        .mobile-fallback .open-btn {
            background: #0f3460;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
        }

        /* ── Footer ─────────────────────────────────────────────── */
        .contact-bar {
            background: #f8f9fa;
            padding: 10px 20px;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #666;
            flex-shrink: 0;
        }
        .contact-bar a {
            color: #e94560;
            text-decoration: none;
            font-weight: 700;
        }

        /* ── Responsive ─────────────────────────────────────────── */
        @media (max-width: 600px) {
            .header-bar { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
            .header-info { flex: 1 1 auto; }
            .header-info h1 { font-size: 16px; }
            .header-info p  { font-size: 10px; }
            .header-actions { flex: 0 0 auto; }
            .btn-label { display: none; }
            .btn { padding: 8px 10px; }

            /* On small screens the <object> often triggers download instead of showing.
               Show the fallback block instead. */
            .pdf-iframe { display: none; }
            .mobile-fallback { display: flex; }
        }
    </style>
</head>
<body>

    <!-- ── Inline PDF viewer (desktop / tablets) ─────────────────────── -->

                </a>
                <a href="CV_Kouadio_Cedric.pdf" download
                   style="color:#0f3460;font-size:14px;text-decoration:underline;">

            </div>
        </object>

        <!-- Mobile fallback (shown via CSS on small screens) -->
        <div class="mobile-fallback">
            <p>Visualisez le CV directement depuis votre navigateur.</p>
            <a class="open-btn" href="CV_Kouadio_Cedric.pdf" target="_blank">
                📄 Ouvrir le CV
            </a>
            <a href="CV_Kouadio_Cedric.pdf" download

    <!-- ── Footer contact bar ────────────────────────────────────────── -->

    <script>
        function downloadCV() {
            const a = document.createElement('a');
            a.href     = 'CV_Kouadio_Cedric.pdf';
            a.download = 'CV_Kouadio_Cedric.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>

</html>
