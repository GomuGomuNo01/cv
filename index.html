<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>CV - Cédric KOUADIO | Data Analyst · IA & Big Data</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100; flex-shrink: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      border-bottom: 3px solid #e94560;
      padding-top: env(safe-area-inset-top, 0px);
    }
    .header-inner {
      display: flex; align-items: center;
      padding: 10px 14px; gap: 8px;
    }
    .title { display:flex; flex-direction:column; line-height:1.1; }
    .title .first { color:#fff;    font-size:clamp(15px,4vw,21px); font-weight:700; }
    .title .last  { color:#e94560; font-size:clamp(15px,4vw,21px); font-weight:900; text-transform:uppercase; letter-spacing:.5px; }

    .actions { margin-left:auto; display:flex; align-items:center; gap:8px; }

    .btn {
      height:42px; border-radius:9px; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:6px;
      text-decoration:none; transition:opacity .15s, transform .1s; flex-shrink:0;
      font-size:12px; font-weight:700; padding:0 12px;
    }
    .btn.icon-only { width:42px; padding:0; }
    .btn:active { opacity:.72; transform:scale(.92); }
    .btn svg { display:block; width:20px; height:20px; }

    .btn-pdf { background:#e94560; color:#fff; white-space:nowrap; }
    .btn-li  { background:#0A66C2; }
    .btn-gh  { background:#ffffff; }

    /* ── Viewer ── */
    .viewer {
      flex:1; overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      background:#e8e8e8;
      padding: 12px;
      padding-bottom: env(safe-area-inset-bottom, 12px);
      display:flex; justify-content:center; align-items:flex-start;
    }

    /* iframe wrapper : dimensions calculées par JS */
    .cv-wrapper {
      position:relative;
      flex-shrink:0;
      box-shadow: 0 6px 32px rgba(0,0,0,.35);
      border-radius: 3px;
      overflow: hidden;
      background: white;
    }
    .cv-frame {
      border: none;
      display: block;
      /* width / height / transform set by JS */
      width: 794px;
      height: 1122px;
      transform-origin: top left;
    }

    @media (min-width: 600px) {
      .header-inner { padding: 12px 20px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="title">
        <span class="first">Cédric</span>
        <span class="last">Kouadio</span>
      </div>
      <div class="actions">

        <!-- Télécharger PDF -->
        <a class="btn btn-pdf"
           href="CV_Kouadio_Cedric.pdf"
           download="CV_Kouadio_Cedric.pdf"
           aria-label="Télécharger le CV en PDF">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v4h5.66V9h3.84L12 2z" transform="rotate(180,12,12)"/>
            <path d="M19 9h-4V3H9v6H5l7 7 7-7z"/>
            <path d="M5 18h14v2H5z"/>
          </svg>
          PDF
        </a>

        <!-- LinkedIn -->
        <a class="btn btn-li icon-only"
           href="https://linkedin.com/in/cedric-kouadio-dev"
           target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/>
          </svg>
        </a>

        <!-- GitHub -->
        <a class="btn btn-gh icon-only"
           href="https://github.com/GomuGomuNo01"
           target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <svg viewBox="0 0 24 24" fill="#181717">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>

      </div>
    </div>
  </header>

  <!-- CV iframe -->
  <main class="viewer">
    <div class="cv-wrapper">
      <iframe class="cv-frame"
              src="CV_Kouadio_Cedric.html"
              title="CV Cédric KOUADIO"
              loading="eager">
      </iframe>
    </div>
  </main>

  <script>
    (function () {
      var FRAME_W = 794, FRAME_H = 1122;
      var viewer  = document.querySelector('.viewer');
      var wrapper = document.querySelector('.cv-wrapper');
      var frame   = document.querySelector('.cv-frame');

      function scale() {
        var pad   = 24; // 12px each side
        var maxW  = Math.min(viewer.clientWidth - pad, 860);
        var s     = maxW / FRAME_W;
        var sw    = Math.round(FRAME_W * s);
        var sh    = Math.round(FRAME_H * s);
        frame.style.transform = 'scale(' + s + ')';
        wrapper.style.width   = sw + 'px';
        wrapper.style.height  = sh + 'px';
      }

      scale();
      window.addEventListener('resize', scale);
    })();
  </script>

</body>
</html>
